<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage with Anime Style" />
    <meta name="author" content="Moyu" />
    <title>Moyu - 量子魔法使 </title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Google fonts-->
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bootstrap core CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link href="static/css/styles.css" rel="stylesheet" />
    <link href="static/css/main.css" rel="stylesheet" />

    <style>
        :root {
            --primary-color: #6a5acd; /* 紫色 */
            --secondary-color: #ff69b4; /* 粉色 */
            --dark-color: #2e2e3a; /* 深色背景 */
            --light-color: #f8f9fa; /* 浅色背景 */
        }
        
        body {
            font-family: 'Noto Sans JP', 'Mulish', sans-serif;
            background-color: var(--light-color);
            color: #333;
        }
        
        .header {
            background-color: var(--dark-color) !important;
            border-bottom: 2px solid var(--primary-color);
        }
        
        .navbar-brand, .nav-link {
            color: white !important;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .nav-link:hover {
            color: var(--secondary-color) !important;
        }

        @media (max-width: 991.98px) {
            #mainNav .navbar-toggler {
                border-color: rgba(255, 255, 255, 0.35);
                color: #fff !important;
                font-weight: 700;
                letter-spacing: 0.08em;
            }

            #mainNav .navbar-toggler:focus {
                box-shadow: 0 0 0 0.18rem rgba(255, 255, 255, 0.18);
            }

            #mainNav .navbar-toggler i {
                color: inherit !important;
            }

            #navbarResponsive {
                margin-top: 12px;
                padding: 8px 0;
                background: var(--dark-color);
                border-top: 1px solid rgba(255, 255, 255, 0.12);
                border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            }

            #navbarResponsive .nav-link {
                color: #fff !important;
                padding: 0.7rem 0.2rem;
                background: transparent;
            }

            #navbarResponsive .nav-link + .nav-link {
                margin-top: 6px;
                border-top: 1px solid rgba(255, 255, 255, 0.08);
            }

            #navbarResponsive .nav-link:hover,
            #navbarResponsive .nav-link:focus {
                color: #ff69b4 !important;
            }
        }
        
        .top-section {
            position: relative;
            height: 300px;
            overflow: hidden;
        }

        .top-section .banner-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .top-section-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            height: 100%;
        }
        
        .top-section-content h2 {
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7), 0 0 20px rgba(106,90,205,0.5);
            margin: 0;
        }

        #avatar {
            text-align: center;
        }

        #avatar img {
            width: 150px;
            height: 150px;
            border-radius: 80%; /* 圆形头像 */
            border: 5px solid var(--primary-color);
            margin-top: -75px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        
        #avatar img:hover {
            transform: scale(1.05);
        }
        
        section {
            padding: 60px 0;
        }
        /* 顶部与内容：直接过渡（无渐变叠层） */
        /* 卡片顶部的轻微阴影，避免割裂 */
        .anime-card { position: relative; }
        .anime-card::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: 0; height: 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0));
            pointer-events: none;
            border-top-left-radius: 10px; border-top-right-radius: 10px;
        }
        
        h2 {
            color: var(--primary-color);
            border-left: 5px solid var(--secondary-color);
            padding-left: 15px;
            margin-bottom: 30px;
            font-family: 'Newsreader', serif;
        }
        
        .anime-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 3px solid var(--secondary-color);
            transition: transform 0.3s;
        }
        
        .anime-card:hover {
            transform: translateY(-5px);
        }
        
        .anime-badge {
            background-color: var(--primary-color);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 5px;
            display: inline-block;
        }

        .hobby-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .hobby-card-head p {
            margin: 0;
            color: #666;
            font-size: 0.95rem;
        }

        .hobby-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .hobby-item {
            padding: 14px 14px 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(106,90,205,0.08), rgba(255,105,180,0.08));
            border: 1px solid rgba(106,90,205,0.16);
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
        }

        .hobby-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .hobby-icon {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6a5acd, #ff69b4);
            color: #fff;
            flex: 0 0 auto;
            box-shadow: 0 6px 14px rgba(106,90,205,0.22);
        }

        .hobby-title {
            font-weight: 800;
            color: #2e2e3a;
            line-height: 1.2;
        }

        .hobby-desc {
            color: #666;
            font-size: 0.92rem;
            line-height: 1.45;
            margin: 0;
        }

        .hobby-chip {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(106,90,205,0.12);
            color: #6a5acd;
            font-size: 0.78rem;
            font-weight: 700;
        }
        
        footer {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.05) 10px, rgba(255,255,255,.05) 20px),
                repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(255,255,255,.05) 10px, rgba(255,255,255,.05) 20px);
            pointer-events: none;
        }
        
        footer .container {
            position: relative;
            z-index: 1;
        }
        
        footer a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        footer a:hover {
            color: var(--secondary-color);
        }
        /* MathJax SVG 样式与字体区分 */
        .mjx-container { line-height: 1.1; }
        .mjx-container svg { height: 1em; vertical-align: -0.2em; }
        #pub-list .mjx-container svg { fill: currentColor; }

        /* 图片灯箱 */
        .lightbox-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            display: none; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .lightbox-overlay.active { display: flex; }
        .lightbox-content {
            max-width: 90vw; max-height: 90vh; box-shadow: 0 10px 30px rgba(0,0,0,.4);
            border-radius: 8px; overflow: hidden; background: #000;
        }
        .lightbox-content img { display: block; width: 100%; height: auto; }
        .lightbox-close {
            position: absolute; top: 16px; right: 20px; color: #fff;
            font-size: 24px; cursor: pointer; user-select: none;
        }

        /* KPI 统计卡片样式 */
        .kpi-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(106,90,205,0.08), rgba(255,105,180,0.08));
            border: 1px solid rgba(106,90,205,0.25);
        }
        .kpi-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display:flex; align-items:center; justify-content:center;
            background: linear-gradient(135deg, #6a5acd, #a78bfa);
            color: #fff;
            box-shadow: 0 6px 16px rgba(106,90,205,0.35);
            font-size: 1.2rem;
        }
        .kpi-text { flex: 1; }
        .kpi-label { font-size: .9rem; color: #666; }
        .kpi-value { font-size: 1.6rem; font-weight: 700; color: #2e2e3a; }
        .kpi-sub { font-size: .85rem; color: #888; }

        #awards-md {
            margin-top: 0.25rem;
        }

        #awards-md .awards-hero {
            padding: 14px 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(106, 90, 205, 0.12), rgba(255, 105, 180, 0.12));
            border: 1px solid rgba(106, 90, 205, 0.18);
            margin-bottom: 16px;
        }

        #awards-md .awards-kicker {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(106, 90, 205, 0.14);
            color: #6a5acd;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        #awards-md .awards-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: #2e2e3a;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        #awards-md .awards-note {
            color: #666;
            font-size: 0.95rem;
        }

        #awards-md .awards-list {
            display: grid;
            gap: 12px;
        }

        #awards-md .award-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            padding: 14px 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 255, 0.96));
            border: 1px solid rgba(106, 90, 205, 0.16);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }

        #awards-md .award-year {
            min-width: 72px;
            padding: 7px 10px;
            border-radius: 999px;
            text-align: center;
            background: linear-gradient(135deg, #6a5acd, #ff69b4);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            box-shadow: 0 8px 18px rgba(106, 90, 205, 0.24);
        }

        #awards-md .award-content {
            flex: 1;
            min-width: 0;
        }

        #awards-md .award-name {
            font-size: 1.05rem;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 4px;
        }

        #awards-md .award-desc {
            color: #6b7280;
            font-size: 0.92rem;
            line-height: 1.5;
        }

        body.dark-mode #awards-md .awards-hero {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.12), rgba(251, 113, 133, 0.12));
            border-color: rgba(167, 139, 250, 0.24);
        }

        body.dark-mode #awards-md .awards-kicker {
            background: rgba(167, 139, 250, 0.18);
            color: #c4b5fd;
        }

        body.dark-mode #awards-md .awards-title,
        body.dark-mode #awards-md .award-name {
            color: #e5e7eb;
        }

        body.dark-mode #awards-md .awards-note,
        body.dark-mode #awards-md .award-desc {
            color: #cbd5e1;
        }

        body.dark-mode #awards-md .award-item {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(17, 24, 39, 0.94));
            border-color: rgba(167, 139, 250, 0.18);
            box-shadow: none;
        }
        
        /* 分页样式 */
        .page {
            display: none;
        }
                /* 夜间模式 */
                body.dark-mode {
                    background-color: #0f172a;
                    color: #e5e7eb;
                }
                body.dark-mode .header { background-color: #0b1220 !important; border-bottom-color: #a78bfa; }
                body.dark-mode .anime-card { background:#0b1220; border-color:#a78bfa33; box-shadow:none; }
                body.dark-mode .anime-badge { background-color:#6a5acd; color:#fff; }
                body.dark-mode h2 { color:#a78bfa; border-left-color:#ff69b4; }
                body.dark-mode .hobby-card-head p { color:#cbd5e1; }
                body.dark-mode .hobby-item { background: linear-gradient(135deg, rgba(167,139,250,0.10), rgba(251,113,133,0.10)); border-color: rgba(167,139,250,0.22); box-shadow:none; }
                body.dark-mode .hobby-title { color:#e5e7eb; }
                body.dark-mode .hobby-desc { color:#cbd5e1; }
                body.dark-mode .hobby-chip { background: rgba(167,139,250,0.16); color:#c4b5fd; }
                /* 夜间模式下的页脚：更柔和的低对比蓝紫 */
                body.dark-mode footer { background: linear-gradient(135deg, #0f172a 0%, #162238 50%, #1e2b46 100%); }
                body.dark-mode #load-toast { background:#111827; color:#e5e7eb; border-color:#374151; }
                body.dark-mode .kpi-card { background:linear-gradient(135deg, rgba(167,139,250,.08), rgba(251,113,133,.08)); border-color:#a78bfa55; }
                body.dark-mode .kpi-value { color:#e5e7eb; }
                body.dark-mode .mjx-container svg { fill: currentColor; }
        
        .page.active {
            display: block;
        }
        
        /* 动画效果 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        /* 角色徽章 / ID 卡样式 */
        .visitor-id-card {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: min(100%, 330px);
            padding: 14px 16px;
            border-radius: 18px;
            background:
                radial-gradient(circle at top right, rgba(251, 191, 36, 0.20), transparent 35%),
                linear-gradient(135deg, rgba(11, 18, 32, 0.82), rgba(49, 46, 129, 0.72));
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.26);
            backdrop-filter: blur(10px);
            text-align: left;
        }

        .visitor-id-avatar {
            width: 56px;
            height: 56px;
            flex: 0 0 auto;
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid rgba(251, 191, 36, 0.55);
            box-shadow: 0 8px 18px rgba(251, 191, 36, 0.18);
        }

        .visitor-id-avatar img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .visitor-id-body {
            flex: 1;
            min-width: 0;
        }

        .visitor-id-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .visitor-id-headline {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .visitor-id-name {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.03em;
            color: #fff;
            line-height: 1.2;
        }

        .visitor-id-title {
            margin-top: 2px;
            font-size: 0.82rem;
            color: rgba(226,232,240,0.88);
        }

        .visitor-id-rarity {
            display: inline-flex;
            align-items: center;
            padding: 4px 9px;
            border-radius: 999px;
            background: linear-gradient(135deg, #f59e0b, #fb7185);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            box-shadow: 0 6px 16px rgba(251, 113, 133, 0.24);
        }

        .visitor-id-rpg {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            margin-bottom: 10px;
        }

        .visitor-id-level-block {
            flex: 0 0 auto;
            min-width: 96px;
        }

        .visitor-id-level-label,
        .visitor-id-exp-label,
        .visitor-id-label {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.72);
            letter-spacing: 0.04em;
        }

        .visitor-id-level-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 96px;
            padding: 8px 12px;
            margin-top: 4px;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #06b6d4 55%, #818cf8);
            color: #fff;
            font-size: 0.86rem;
            font-weight: 900;
            box-shadow: 0 8px 18px rgba(34, 211, 238, 0.22);
        }

        .visitor-id-exp-block {
            flex: 1;
            min-width: 0;
        }

        .visitor-id-exp-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        .visitor-id-exp-value {
            font-size: 0.82rem;
            color: #fff;
            font-weight: 800;
            white-space: nowrap;
        }

        .visitor-id-exp-bar {
            position: relative;
            height: 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.10);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.10);
        }

        .visitor-id-exp-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #34d399, #22d3ee, #818cf8);
            box-shadow: 0 0 18px rgba(34, 211, 238, 0.35);
            transition: width 0.35s ease;
        }

        .visitor-id-status {
            flex: 0 0 auto;
            padding: 5px 10px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .visitor-id-stats {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .visitor-id-counter-box {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }

        .visitor-id-counter-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 90px;
            min-height: 50px;
            padding: 8px 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .visitor-id-counter-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            background:
                linear-gradient(135deg, rgba(251, 191, 36, 0.10), transparent 45%),
                linear-gradient(225deg, rgba(34, 211, 238, 0.08), transparent 45%);
            z-index: 1;
        }

        .visitor-id-guild-seal {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 0;
        }

        .visitor-id-guild-icon {
            font-size: 1.6rem;
            line-height: 1;
        }

        .visitor-id-guild-text {
            font-size: 0.82rem;
            font-weight: 800;
            color: #fbbf24;
            letter-spacing: 0.06em;
            line-height: 1.2;
        }

        .visitor-id-counter-note {
            font-size: 0.72rem;
            color: rgba(226,232,240,0.72);
            letter-spacing: 0.04em;
        }

        .visitor-id-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 88px;
        }

        .visitor-id-stat:nth-child(1) {
            min-width: 100px;
        }

        .visitor-id-stat:nth-child(2) {
            min-width: 92px;
        }

        .visitor-id-label {
            color: rgba(226,232,240,0.72);
        }

        .visitor-id-value {
            font-size: 1.08rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.1;
        }

        @media (max-width: 991px) {
            .visitor-id-card {
                width: 100%;
                margin-top: 1rem;
            }
        }
        #quest-board {
            border-top: 3px solid #f59e0b;
            background: linear-gradient(135deg, #fffbeb 0%, #fff 30%, #fefce8 100%);
        }

        #quest-board h3 {
            color: #92400e;
        }

        #quest-board .form-label {
            font-weight: 700;
            color: #78350f;

    <script>
        (function () {
            const totalKey = 'visitorBadgeProfileTotal_v3';
            const dateKey = 'visitorBadgeDate_v5';
            const imageKey = 'visitorBadgeCached_v5';

            const today = (() => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            })();

            const totalEl = document.getElementById('visitor-total');
            const todayEl = document.getElementById('visitor-today');
            const statusEl = document.getElementById('visitor-status');
            const rarityEl = document.getElementById('visitor-rarity');
            const levelEl = document.getElementById('visitor-level');
            const expTextEl = document.getElementById('visitor-exp-text');
            const expFillEl = document.getElementById('visitor-exp-fill');

            if (!totalEl || !todayEl || !statusEl || !rarityEl || !levelEl || !expTextEl || !expFillEl) {
                return;
            }

            const renderBadge = (localVisits, firstVisitToday, sourceLabel, imgSrc) => {
                const expPerLevel = 7;
                const level = Math.floor(localVisits / expPerLevel) + 1;
                const exp = localVisits % expPerLevel;
                const expRate = Math.max(0, Math.min(100, (exp / expPerLevel) * 100));
                const rankList = [
                    '见习术士',
                    '青铜冒险者',
                    '白银探索者',
                    '黄金讨伐者',
                    '秘银旅人',
                    '传说勇者'
                ];
                const rank = rankList[Math.min(rankList.length - 1, Math.floor((level - 1) / 2))];

                if (imgSrc) totalEl.src = imgSrc;
                todayEl.textContent = firstVisitToday ? '委托达成' : '待命中';
                statusEl.textContent = sourceLabel;
                rarityEl.textContent = localVisits >= 10 ? 'SSR' : localVisits >= 5 ? 'SR' : 'R';
                levelEl.textContent = `${rank} Lv.${String(level).padStart(2, '0')}`;
                expTextEl.textContent = `${exp} / ${expPerLevel}`;
                expFillEl.style.width = `${expRate}%`;
            };

            try {
                // 清理旧版缓存，从头开始计数
                ['visitorBadgeTotal_v1', 'visitorBadgeDate_v1', 'visitorBadgeDate_v2',
                 'visitorBadgeGlobalImage_v1', 'visitorBadgeGlobalImage_v2',
                 'visitorBadgeProfileTotal_v1'].forEach(function (k) {
                    localStorage.removeItem(k);
                });

                const storedDate = localStorage.getItem(dateKey);
                const firstVisitToday = storedDate !== today;
                let localVisits = parseInt(localStorage.getItem(totalKey) || '0', 10);

                if (!Number.isFinite(localVisits) || localVisits < 0) {
                    localVisits = 0;
                }

                const countBase = 'https://count.getloli.com/get/@Taowayi-guild?theme=asoul';
                const countUrl = countBase + '&v=' + today;

                if (!firstVisitToday) {
                    totalEl.src = localStorage.getItem(imageKey) || countUrl;
                    renderBadge(localVisits, false, '待命中');
                    return;
                }

                // 当日首访：加载计数图 + 缓存 URL，当天不再变
                localVisits += 1;
                localStorage.setItem(totalKey, String(localVisits));
                localStorage.setItem(dateKey, today);

                var ping = new Image();
                ping.onload = function () {
                    totalEl.src = countUrl;
                    localStorage.setItem(imageKey, countUrl);
                    renderBadge(localVisits, true, '报到完了');
                };
                ping.onerror = function () {
                    totalEl.src = localStorage.getItem(imageKey) || countUrl;
                    renderBadge(localVisits, true, '单人探索');
                };
                ping.src = countUrl;
            } catch (error) {
                var fallback = parseInt(localStorage.getItem(totalKey) || '1', 10);
                if (!Number.isFinite(fallback) || fallback < 0) fallback = 1;
                totalEl.src = localStorage.getItem(imageKey) || '';
                renderBadge(fallback, true, '单人探索');
            }
        })();
    </script>
